name: CI/CD Tienda Perritos ECS

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

env:
  ECR_REPO_FRONTEND: tienda-frontend
  ECR_REPO_BACKEND: tienda-backend
  ECR_REPO_DB: tienda-db
  ECS_CLUSTER: tienda-cluster

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Definir tag de imagen
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # ---------- BUILD & PUSH FRONTEND ----------
      - name: Build & push FRONTEND
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd frontend
          docker build -t $ECR_REGISTRY/${ECR_REPO_FRONTEND}:${IMAGE_TAG} .
          docker tag $ECR_REGISTRY/${ECR_REPO_FRONTEND}:${IMAGE_TAG} $ECR_REGISTRY/${ECR_REPO_FRONTEND}:latest
          docker push $ECR_REGISTRY/${ECR_REPO_FRONTEND}:${IMAGE_TAG}
          docker push $ECR_REGISTRY/${ECR_REPO_FRONTEND}:latest

      # ---------- BUILD & PUSH BACKEND ----------
      - name: Build & push BACKEND
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd backend
          docker build -t $ECR_REGISTRY/${ECR_REPO_BACKEND}:${IMAGE_TAG} .
          docker tag $ECR_REGISTRY/${ECR_REPO_BACKEND}:${IMAGE_TAG} $ECR_REGISTRY/${ECR_REPO_BACKEND}:latest
          docker push $ECR_REGISTRY/${ECR_REPO_BACKEND}:${IMAGE_TAG}
          docker push $ECR_REGISTRY/${ECR_REPO_BACKEND}:latest

      # ---------- BUILD & PUSH DB ----------
      - name: Build & push DB
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd db
          docker build -t $ECR_REGISTRY/${ECR_REPO_DB}:${IMAGE_TAG} .
          docker tag $ECR_REGISTRY/${ECR_REPO_DB}:${IMAGE_TAG} $ECR_REGISTRY/${ECR_REPO_DB}:latest
          docker push $ECR_REGISTRY/${ECR_REPO_DB}:${IMAGE_TAG}
          docker push $ECR_REGISTRY/${ECR_REPO_DB}:latest

      # ---------- REGISTER TASK DEFINITION DB ----------
      - name: Register task definition DB
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          sed "s|:latest|:${IMAGE_TAG}|g" ecs/tienda-db-taskdef.json > /tmp/td-db.json
          aws ecs register-task-definition --cli-input-json file:///tmp/td-db.json

      # ---------- REGISTER TASK DEFINITION BACKEND ----------
      - name: Register task definition BACKEND
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          sed "s|:latest|:${IMAGE_TAG}|g" ecs/tienda-backend-taskdef.json > /tmp/td-backend.json
          aws ecs register-task-definition --cli-input-json file:///tmp/td-backend.json

      # ---------- REGISTER TASK DEFINITION FRONTEND ----------
      - name: Register task definition FRONTEND
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          sed "s|:latest|:${IMAGE_TAG}|g" ecs/tienda-frontend-taskdef.json > /tmp/td-frontend.json
          aws ecs register-task-definition --cli-input-json file:///tmp/td-frontend.json

      # ---------- UPDATE ECS SERVICES ----------
      - name: Update service DB
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service svc-tienda-db \
            --task-definition tienda-db \
            --force-new-deployment

      - name: Update service BACKEND
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service svc-tienda-backend \
            --task-definition tienda-backend \
            --force-new-deployment

      - name: Update service FRONTEND
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service svc-tienda-frontend \
            --task-definition tienda-frontend \
            --force-new-deployment

      # ---------- VER ESTADO FINAL ----------
      - name: Ver servicios y tareas
        run: |
          aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services svc-tienda-db svc-tienda-backend svc-tienda-frontend \
            --query "services[*].[serviceName,status,runningCount,desiredCount]" \
            --output table
