name: CI/CD Tienda Perritos EKS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPO_FRONTEND: tienda-frontend
  ECR_REPO_BACKEND: tienda-backend
  ECR_REPO_DB: tienda-db
  EKS_CLUSTER: tienda-cluster
  EKS_NAMESPACE: tienda

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Definir tag de imagen
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build & push Frontend
        run: |
          cd frontend
          docker build -t ${{ steps.login-ecr.outputs.registry }}/$ECR_REPO_FRONTEND:$IMAGE_TAG .
          docker push ${{ steps.login-ecr.outputs.registry }}/$ECR_REPO_FRONTEND:$IMAGE_TAG

      - name: Build & push Backend
        run: |
          cd backend
          docker build -t ${{ steps.login-ecr.outputs.registry }}/$ECR_REPO_BACKEND:$IMAGE_TAG .
          docker push ${{ steps.login-ecr.outputs.registry }}/$ECR_REPO_BACKEND:$IMAGE_TAG

      - name: Build & push DB
        run: |
          cd db
          docker build -t ${{ steps.login-ecr.outputs.registry }}/$ECR_REPO_DB:$IMAGE_TAG .
          docker push ${{ steps.login-ecr.outputs.registry }}/$ECR_REPO_DB:$IMAGE_TAG

      - name: Configurar kubectl
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER

      - name: Actualizar imágenes en EKS
        run: |
          kubectl set image deployment/tienda-backend -n $EKS_NAMESPACE \
            backend=${{ steps.login-ecr.outputs.registry }}/$ECR_REPO_BACKEND:$IMAGE_TAG
          kubectl set image deployment/tienda-frontend -n $EKS_NAMESPACE \
            frontend=${{ steps.login-ecr.outputs.registry }}/$ECR_REPO_FRONTEND:$IMAGE_TAG
          kubectl set image deployment/tienda-db -n $EKS_NAMESPACE \
            mysql=${{ steps.login-ecr.outputs.registry }}/$ECR_REPO_DB:$IMAGE_TAG

      - name: Verificar Rollout
        run: |
          kubectl rollout status deployment/tienda-backend -n $EKS_NAMESPACE --timeout=120s
          kubectl rollout status deployment/tienda-frontend -n $EKS_NAMESPACE --timeout=120s
          kubectl rollout status deployment/tienda-db -n $EKS_NAMESPACE --timeout=120s

      - name: Estado final
        run: |
          kubectl get pods -n $EKS_NAMESPACE
          kubectl get hpa -n $EKS_NAMESPACE
